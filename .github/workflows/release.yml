name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libgtk-3-dev \
            libssl-dev \
            file

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify required secrets are present
        shell: bash
        env:
          ABEONMAIL_GOOGLE_CLIENT_ID: ${{ secrets.ABEONMAIL_GOOGLE_CLIENT_ID }}
          ABEONMAIL_GOOGLE_CLIENT_SECRET: ${{ secrets.ABEONMAIL_GOOGLE_CLIENT_SECRET }}
          ABEONMAIL_MICROSOFT_CLIENT_ID: ${{ secrets.ABEONMAIL_MICROSOFT_CLIENT_ID }}
        run: |
          missing=0
          for var in ABEONMAIL_GOOGLE_CLIENT_ID ABEONMAIL_GOOGLE_CLIENT_SECRET ABEONMAIL_MICROSOFT_CLIENT_ID; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing required secret: $var"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ]

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          ABEONMAIL_GOOGLE_CLIENT_ID: ${{ secrets.ABEONMAIL_GOOGLE_CLIENT_ID }}
          ABEONMAIL_GOOGLE_CLIENT_SECRET: ${{ secrets.ABEONMAIL_GOOGLE_CLIENT_SECRET }}
          ABEONMAIL_MICROSOFT_CLIENT_ID: ${{ secrets.ABEONMAIL_MICROSOFT_CLIENT_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AbeonMail ${{ github.ref_name }}'
          releaseBody: 'Pobierz właściwy plik instalacyjny dla swojej platformy z sekcji Assets.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
